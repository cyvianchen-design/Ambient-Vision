<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commure Ambient – Interactive Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  background: #0e0e18;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 68px 24px 60px;
  color: #fff;
  transition: background 0.5s ease;
}
/* Pre/post visit: no context labels at top, so shrink top padding to gain vertical space */
body:not(.stage-during) {
  padding-top: 24px;
}
/* Day/night split — split offset computed dynamically by fitDevices() */
body.stage-during {
  background: linear-gradient(
    to right,
    #fffbf4 0%,
    #fffbf4 calc(50% - var(--split-offset, 356px)),
    #04091a calc(50% - var(--split-offset, 356px)),
    #04091a 100%
  );
}

.demo-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

.demo-stage {
  display: flex;
  align-items: flex-start;
  gap: 36px;
  justify-content: center;
}

.device-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.device-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

/* ── Desktop shell: sized dynamically by fitDevices() ── */
.desktop-shell {
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 64px rgba(0,0,0,0.65);
  position: relative;
  transform-origin: top left;
  flex-shrink: 0;
}
.desktop-inner {
  width: 1280px;
  height: 760px;
  transform: scale(0.585);
  transform-origin: top left;
  display: flex;
  overflow: hidden;
  background: #f7f7f7;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
}

/* ── Mobile shell: sized dynamically by fitDevices() ── */
.mobile-shell {
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 64px rgba(0,0,0,0.65);
  position: relative;
  transform-origin: top left;
  flex-shrink: 0;
}
.mobile-inner {
  width: 390px;
  height: 844px;
  transform: scale(0.525);
  transform-origin: top left;
  display: flex;
  flex-direction: column;
  background: #f7f7f7;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  overflow: hidden;
}

/* ── Design tokens ── */
:root {
  --brand: #1132ee;
  --nav-btn: rgba(17,50,238,0.12);
  --surface-info: #f1f3fe;
  --surface-1: #f7f7f7;
  --surface-2: #f2f2f2;
  --surface-3: #e6e6e6;
  --surface-base: #ffffff;
  --outline: rgba(0,0,0,0.1);
  --neutral-200: #ccc;
  --text-default: #000000;
  --text-body: #1a1a1a;
  --text-sub: #666666;
  --text-ph: #808080;
  --text-brand: #1132ee;
  --text-white: #ffffff;
  --orange-200: #ffd699;
  --green: #479e4c;
  --red: #bb1411;
  --magic: linear-gradient(-89.166deg, rgb(128,68,255) 2.281%, rgb(69,84,229) 50.375%, rgb(38,112,255) 98.469%);
}

/* ── Primary nav (sidebar) ── */
.primary-nav {
  width: 72px;
  min-width: 72px;
  height: 100%;
  background: var(--surface-base);
  border-right: 1px solid var(--outline);
  display: flex;
  flex-direction: column;
  align-items: center;
}
.nav-logo {
  width: 72px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--outline);
  flex-shrink: 0;
  color: var(--text-sub);
  cursor: pointer;
}
.nav-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 24px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  width: 100%;
}
.nav-icon-wrap {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  color: var(--text-sub);
  transition: background 0.12s;
}
.nav-item:hover .nav-icon-wrap { background: var(--surface-3); }
.nav-item.active .nav-icon-wrap {
  background: var(--nav-btn);
  color: var(--brand);
}
.nav-item-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: -0.36px;
  line-height: 1.2;
}
.nav-item.active .nav-item-label { color: var(--brand); }
.nav-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0 24px;
  gap: 8px;
  border-top: 1px solid var(--outline);
  width: 100%;
}
.nav-footer-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-sub);
}
.nav-footer-btn:hover { background: rgba(0,0,0,0.03); }
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 64px;
  background: var(--orange-200);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-default);
  cursor: pointer;
}

/* ── Secondary nav (scribe/patient list) ── */
.secondary-nav {
  width: 220px;
  min-width: 220px;
  height: 100%;
  background: var(--surface-1);
  border-right: 1px solid var(--neutral-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sec-nav-header {
  height: 48px;
  min-height: 48px;
  display: flex;
  align-items: center;
  padding: 12px 8px;
  flex-shrink: 0;
}
.sec-nav-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.15px;
  padding: 0 4px;
}
.sec-nav-btns {
  display: flex;
  gap: 4px;
  padding: 0 4px;
  flex-shrink: 0;
}
.btn-tertiary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  font-size: 13px;
  font-weight: 700;
  color: var(--text-brand);
  letter-spacing: 0.13px;
  height: 28px;
  white-space: nowrap;
}
.btn-tertiary:hover { background: var(--surface-1); }
.btn-tertiary-neutral {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: 0.13px;
  height: 28px;
  white-space: nowrap;
}
.btn-tertiary-neutral:hover { background: var(--surface-1); }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  font-weight: 700;
  color: var(--text-white);
  background: var(--text-body);
  white-space: nowrap;
}
.btn-primary:hover { background: #333; }
.btn-primary.sm { padding: 6px 10px; font-size: 13px; height: 28px; letter-spacing: 0.13px; }
.btn-primary.md { padding: 8px 16px; font-size: 15px; height: 36px; letter-spacing: 0.15px; }
.btn-primary.lg { padding: 12px 20px; font-size: 17px; height: 48px; letter-spacing: 0.34px; }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--text-default);
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  font-weight: 700;
  color: var(--text-default);
  background: transparent;
  white-space: nowrap;
}
.btn-secondary:hover { background: var(--surface-1); }
.btn-secondary.lg { padding: 12px 20px; font-size: 17px; height: 48px; letter-spacing: 0.34px; }
.icon-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-brand);
}
.icon-btn:hover { background: var(--surface-1); }
.icon-btn.md { width: 36px; height: 36px; }

.sec-nav-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.date-group-label {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 0.065px;
  padding: 8px 12px;
  line-height: 1.2;
}
.list-item-wrap {
  padding: 0 4px;
}
.list-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  transition: background 0.1s;
}
.list-item:hover { background: rgba(0,0,0,0.01); }
.list-item.selected {
  background: var(--surface-base);
  border: 1px solid var(--outline);
}
/* In App.tsx patient item style (visits tab): border-r-2 style */
.patient-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 16px 8px 16px 12px;
  cursor: pointer;
  background: transparent;
  border: none;
  width: 220px;
  text-align: left;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  transition: background 0.1s;
  border-right: 2px solid transparent;
}
.patient-item:hover { background: var(--surface-1); }
.patient-item.selected {
  background: var(--surface-info);
  border-right: 2px solid var(--brand);
}
.item-row1 { display: flex; align-items: center; gap: 4px; width: 100%; }
.item-name {
  flex: 1;
  min-width: 0;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.2;
}
.item-row2 {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  letter-spacing: 0.065px;
  line-height: 1.4;
  white-space: nowrap;
}
.item-meta { color: var(--text-sub); display: flex; gap: 4px; flex: 1; }
.item-time { color: var(--text-ph); }
.status-generated { font-size: 13px; font-weight: 700; color: var(--green); }
.status-processing { font-size: 13px; font-weight: 700; color: var(--brand); }
.status-queue { font-size: 13px; font-weight: 700; color: #b45309; }

/* ── Main content area ── */
.main-area {
  flex: 1;
  min-width: 0;
  height: 100%;
  background: var(--surface-1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Center column */
.center-col {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 4px;
}

/* Note card */
.note-card {
  background: var(--surface-base);
  border-radius: 8px;
  box-shadow: 0 4px 16px 2px rgba(0,0,0,0.07);
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}

/* Tabs */
.tabs-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--outline);
  padding: 0 20px;
  flex-shrink: 0;
}
.tab {
  padding: 6px 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-feature-settings: 'ss07';
  font-size: 13px;
  font-weight: 700;
  color: var(--text-ph);
  letter-spacing: 0.13px;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab:hover { background: #f5f5f5; }
.tab.active { color: var(--brand); border-bottom: 2px solid var(--brand); }

/* Note content */
.note-scroll { flex: 1; overflow-y: auto; padding: 12px 0; }
.note-template-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.15px;
  padding: 8px 20px 32px;
  line-height: 1.2;
}
.note-section {
  padding: 12px 0;
  border-top: 1px solid var(--outline);
}
.note-section-head {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 20px 4px;
}
.note-section-title {
  flex: 1;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  line-height: 1.2;
  padding-left: 8px;
}
.note-section-actions { display: flex; gap: 4px; }
.note-section-body {
  padding: 8px 20px;
  font-size: 15px;
  color: #111827;
  letter-spacing: 0.15px;
  line-height: 1.4;
  white-space: pre-wrap;
}

/* ── Right panel ── */
.right-panel {
  width: 375px;
  min-width: 375px;
  height: 100%;
  background: var(--surface-1);
  padding: 4px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-card {
  background: var(--surface-base);
  border-radius: 8px;
  box-shadow: 0 4px 16px 2px rgba(0,0,0,0.07);
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-tabs-wrap {
  background: var(--surface-1);
  padding: 12px 20px 0;
  flex-shrink: 0;
}

/* ── Actions panel content ── */
.actions-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.action-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.action-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.action-group-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  line-height: 1.2;
}
.action-nudge {
  background: var(--surface-1);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.action-nudge-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  line-height: 1.4;
}
.action-nudge-body {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 0.065px;
  line-height: 1.4;
}
.nudge-action-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* ── Previsit (Visits view) ── */
.visits-main {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.visits-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}
.previsit-section {
  padding: 12px 0;
}
.previsit-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  line-height: 1.2;
  padding: 0 20px 4px;
}
.previsit-list {
  padding: 0 20px;
  font-size: 15px;
  color: var(--text-body);
  letter-spacing: 0.15px;
  line-height: 1.4;
  list-style: disc;
  margin-left: 22.5px;
}
.previsit-list li { margin-bottom: 2px; }
.visits-bottom-bar {
  background: var(--surface-base);
  padding: 8px 0 24px;
  display: flex;
  justify-content: center;
  flex-shrink: 0;
}
.start-visit-area {
  max-width: 800px;
  width: 100%;
  padding: 0 20px;
}

/* ── Right panel (Visits/Previsit) ── */
.previsit-right {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.data-source-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 12px;
  background: var(--surface-1);
  border-radius: 8px;
  cursor: pointer;
}
.data-source-item:hover { background: var(--surface-2); }
.ds-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.11px;
  line-height: 1.2;
}
.ds-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.13px;
  line-height: 1.2;
}
.ds-snippet {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 0.065px;
  line-height: 1.4;
}

/* ── Recording view ── */
.recording-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.recording-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 24px;
}
.recording-status {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.rec-patient-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.24px;
}
.rec-timer {
  font-size: 40px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}
.rec-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff0f0;
  border-radius: 8px;
  padding: 8px 16px;
}
.rec-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #bb1411;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.rec-label {
  font-size: 15px;
  font-weight: 700;
  color: #bb1411;
  letter-spacing: 0.15px;
}
.waveform-row {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 48px;
}
.wbar {
  width: 4px;
  background: var(--brand);
  border-radius: 2px;
  opacity: 0.8;
  animation: wv 1.2s ease-in-out infinite;
}
@keyframes wv { 0%,100%{transform:scaleY(0.2)} 50%{transform:scaleY(1)} }
.magic-mic-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content:center;
  background: var(--magic);
  box-shadow: 0 8px 24px rgba(69,84,229,0.4);
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 8px 24px rgba(69,84,229,0.4); }
  50% { box-shadow: 0 8px 40px rgba(69,84,229,0.7); }
}
.magic-mic-btn.stop {
  background: #bb1411;
  box-shadow: 0 8px 24px rgba(187,20,17,0.4);
  animation: none;
}
.recording-actions {
  display: flex;
  gap: 12px;
}

/* ── Processing view ── */
.processing-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 24px;
}
.spinner-ring {
  width: 56px;
  height: 56px;
  border: 3px solid var(--surface-info);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-label {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-default);
  letter-spacing: 0.34px;
}
.processing-sub {
  font-size: 15px;
  color: var(--text-sub);
  letter-spacing: 0.15px;
  text-align: center;
  line-height: 1.4;
}
.processing-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 340px;
}
.processing-step {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 0.065px;
}
.step-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.step-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--surface-info);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

/* ── Mobile ── */
.mobile-header {
  background: var(--surface-base);
  border-bottom: 1px solid var(--outline);
  padding: 12px 16px;
  flex-shrink: 0;
}
.mobile-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mobile-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mobile-logo-text {
  font-size: 17px;
  font-weight: 900;
  color: var(--text-default);
  letter-spacing: 0.17px;
}
.mobile-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-2);
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 8px;
}
.mobile-search-text {
  font-size: 15px;
  color: var(--text-ph);
  letter-spacing: 0.15px;
}
.mobile-content { flex: 1; overflow-y: auto; min-height: 0; }
.mobile-section-label {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 0.065px;
  padding: 8px 16px;
  line-height: 1.2;
}
.mobile-patient-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 16px;
  cursor: pointer;
  border-right: 2px solid transparent;
  transition: background 0.1s;
}
.mobile-patient-item:hover { background: var(--surface-1); }
.mobile-patient-item.selected { background: var(--surface-info); border-right: 2px solid var(--brand); }
.mobile-bottom-nav {
  background: var(--surface-base);
  border-top: 1px solid var(--outline);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 8px 0 12px;
  flex-shrink: 0;
}
.mobile-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text-ph);
  padding: 4px 16px;
}
.mobile-nav-item.active { color: var(--brand); }
.mobile-nav-label { font-size: 12px; font-weight: 700; line-height: 1.2; letter-spacing: -0.36px; }

/* Mobile previsit */
.mobile-previsit { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.mobile-card {
  background: var(--surface-base);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.mobile-card-title { font-size: 13px; font-weight: 700; color: var(--text-default); margin-bottom: 6px; letter-spacing: 0.13px; }
.mobile-card-body { font-size: 13px; color: var(--text-body); letter-spacing: 0.065px; line-height: 1.4; }

/* Mobile recording */
.mobile-recording {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 24px;
}

/* Mobile note */
.mobile-note { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.mobile-note-section { display: flex; flex-direction: column; gap: 4px; }
.mobile-note-section-title { font-size: 13px; font-weight: 700; color: var(--text-default); letter-spacing: 0.13px; border-bottom: 1px solid var(--outline); padding-bottom: 4px; margin-bottom: 4px; }
.mobile-note-section-body { font-size: 13px; color: #111827; letter-spacing: 0.065px; line-height: 1.4; }

/* ── Step nav ── */
.step-nav {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px;
  padding: 10px 18px;
}
.step-nav button {
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.step-nav button:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
.step-nav button:disabled { opacity: 0.25; cursor: default; }
.step-dots { display: flex; align-items: center; gap: 5px; }
.step-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  cursor: pointer;
  transition: all 0.18s;
}
.step-dot.active { background: #1132ee; width: 18px; border-radius: 3px; }
.step-desc { font-size: 11px; color: rgba(255,255,255,0.4); min-width: 200px; text-align: center; }
.stage-label {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
}
.stage-label.stage-pre    { background: rgba(17,50,238,0.25);  color: #7b96ff; }
.stage-label.stage-during { background: rgba(128,68,255,0.12);  color: #8044ff; }
.stage-label.stage-post   { background: rgba(71,158,76,0.25);   color: #7fd984; }

.demo-step-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
}

/* ── Top context labels (during visit only) ── */
.ctx-panel {
  position: fixed;
  top: 24px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.ctx-panel.visible { opacity: 1; }
.ctx-panel.ctx-mobile { left: 36px; }
.ctx-panel.ctx-desktop { right: 36px; }
.ctx-label {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}
.ctx-panel.ctx-mobile .ctx-label  { color: rgba(120, 80, 20, 0.7); }
.ctx-panel.ctx-desktop .ctx-label { color: rgba(100, 140, 255, 0.9); }

/* ── Bottom-left: stepper dots + stage + desc ── */
.demo-stepper {
  position: fixed;
  bottom: 24px;
  left: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 100;
}
/* During visit: stepper sits over the light cream side — flip to dark ink */
body.stage-during .step-dot { background: rgba(0,0,0,0.15); }
body.stage-during .demo-step-desc { color: rgba(0,0,0,0.4); }

/* ── Bottom-right: nav + audio ── */
.demo-controls {
  position: fixed;
  bottom: 20px;
  right: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 100;
}
.ctrl-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  backdrop-filter: blur(8px);
}
.ctrl-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
.ctrl-btn:disabled { opacity: 0.25; cursor: default; }
.ctrl-btn.audio-btn {
  background: rgba(187,20,17,0.25);
  border-color: rgba(187,20,17,0.4);
  color: #ff8a87;
  font-size: 10px;
}
.ctrl-btn.audio-btn:hover { background: rgba(187,20,17,0.4); }
.ctrl-btn.audio-btn.playing {
  background: rgba(187,20,17,0.5);
}
/* hidden by default, shown only during "during" stage */
.audio-btn { display: none; }
.audio-btn.visible { display: flex; }

/* ── Device wrap ── */
.device-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px;
  transition: opacity 0.3s ease;
}
.device-wrap.hidden {
  display: none;
}
/* Device label hidden — context shown at top instead */
.device-tag { display: none; }
</style>
</head>

</div>

    </div>
  </div>

</div>

// Waveform bars
function waveform(count=36) {
  const hs = [20,40,70,55,90,65,80,45,75,60,85,50,70,40,80,60,50,90,70,55,65,80,45,70,60,85,50,40,75,65,55,80,45,70,55,40];
  return Array.from({length:count},(_,i)=>{
    const h=hs[i%hs.length];
    const d=(i*0.06).toFixed(2);
    return `<div class="wbar" style="height:${h}%;animation-delay:${d}s"></div>`;
  }).join('');
}

// ═══════════════════════════════════════
// STATES
// ═══════════════════════════════════════
// stage: 'pre' | 'during' | 'post'
// scrollTo: id suffix passed to React app for scrollIntoView
// spotlight: data-demo-id target for zoom overlay in React app
// emptyNote: render scribes with blank sections (during-visit only)
const STATES = [
  // ── PRE-VISIT (step 0) ───────────────────────────────────
  { stage: 'pre',    reactStep: 0, desc: 'Pre-visit summary',      scrollTo: 'at-a-glance', spotlight: null, emptyNote: false },
  // ── VISIT OVERVIEW (preview — no audio, no animations) ───
  { stage: 'during', isPreview: true, desc: 'During visit overview', scrollTo: null,          spotlight: null, emptyNote: false },
  // ── DURING VISIT (steps 1–4) ─────────────────────────────
  { stage: 'during', reactStep: 1, desc: 'Symptoms captured',   scrollTo: null, spotlight: null, emptyNote: false, audio: ['clip01.mp3', 'clip02.mp3'] },
  { stage: 'during', reactStep: 2, desc: 'BP exam',             scrollTo: null, spotlight: null, emptyNote: true,  audio: ['clip03.mp3', 'clip04.mp3'] },
  { stage: 'during', reactStep: 3, desc: 'Diagnosis confirmed', scrollTo: null, spotlight: null, emptyNote: false, audio: ['clip05.mp3', 'clip06.mp3', 'clip07.mp3'] },
  { stage: 'during', reactStep: 4, desc: 'Preventive care',     scrollTo: null, spotlight: null, emptyNote: false, audio: ['clip08.mp3', 'clip09.mp3'] },
  // ── POST-VISIT (step 6) ───────────────────────────────────
  { stage: 'post',   reactStep: 5, desc: 'Post-visit summary',  scrollTo: null,          spotlight: null, emptyNote: false },
];

let currentStep = 0;

function renderState(step) {
  const da = document.getElementById('desktopApp');
  const ma = document.getElementById('mobileApp');

  let desk = '', mob = '';
  switch(step) {
    case 0:
      desk = primaryNav('visits') + visitsSecNav(0) + visitsView();
      mob  = mobilePrevisitView();
      break;
    case 1:
      desk = primaryNav('visits') + visitsSecNav(0) + recordingView(false);
      mob  = mobileRecordingView(false);
      break;
    case 2:
      desk = primaryNav('visits') + visitsSecNav(0) + recordingView(true);
      mob  = mobileRecordingView(true);
      break;
    case 3:
      desk = primaryNav('visits') + visitsSecNav(0) + processingView();
      mob  = mobileProcessingView();
      break;
    case 4:
      desk = primaryNav('scribes') + scribesSecNav(0) + noteView('clinical', true);
      mob  = mobileNoteView(true);
      break;
  }
  da.innerHTML = desk;
  ma.innerHTML = mob;
}

function goToState(step) {
  currentStep = step;
  const state = STATES[step];


  // ── Audio: stop current clip, load new one if this step has audio ──
  audioEl.pause();
  audioEl.src = '';
  audioQueue = [];
  audioFakePlaying = false;
  const audioBtn = document.getElementById('audioPlayBtn');
  audioBtn.textContent = '▶';
  audioBtn.classList.remove('playing');

  if (state.audio) {
    audioQueue = [...state.audio];
    const delay = (state.reactStep === 1) ? 2000 : 0;
    setTimeout(() => playNextClip(), delay);
  }

  updateNav();
  const baseMsg = {
    type: 'DEMO_STATE',
    step:      state.isPreview ? -1 : (state.reactStep ?? step),
    isPreview: !!state.isPreview,
    scrollTo:  state.scrollTo  || null,
    emptyNote: state.emptyNote || false,
  };
  const mf = document.getElementById('mobileFrame');
  const df = document.getElementById('desktopFrame');
  if (mf) mf.contentWindow.postMessage({ ...baseMsg, spotlight: null, isMobile: true }, '*');
  if (df) df.contentWindow.postMessage({ ...baseMsg, spotlight: state.spotlight || null, isMobile: false }, '*');
}
function prevStep() { if(currentStep>0){ goToState(currentStep-1); } }
function nextStep() { if(currentStep<STATES.length-1){ goToState(currentStep+1); } }

function updateNav() {
  const state = STATES[currentStep];
  document.getElementById('btnPrev').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === STATES.length - 1;
  document.getElementById('stepDesc').textContent = state.desc;

  // Stage badge
  const stageEl = document.getElementById('stageLabel');
  const stageMap = { pre: ['stage-pre','Pre-visit'], during: ['stage-during','During visit'], post: ['stage-post','Post-visit'] };
  const [cls, lbl] = stageMap[state.stage];
  stageEl.className = `stage-label ${cls}`;
  stageEl.textContent = lbl;

  // Show mobile only during visit; hide for pre/post
  const isDuring = state.stage === 'during';
  document.getElementById('mobileWrap').classList.toggle('hidden', !isDuring);
  document.body.classList.toggle('stage-during', isDuring);
  document.getElementById('mobileCtxPanel').classList.toggle('visible', isDuring);
  document.getElementById('desktopCtxPanel').classList.toggle('visible', isDuring);
  fitDevices();

  // Audio button: only visible during "during" stage
  const audioBtn = document.getElementById('audioPlayBtn');
  if (state.stage === 'during') {
    audioBtn.classList.add('visible');
  } else {
    audioBtn.classList.remove('visible');
    // Pause if we navigate away from during
    if (audioFakePlaying) {
      clearInterval(audioFakeInterval);
      audioFakePlaying = false;
      audioBtn.textContent = '▶';
      audioBtn.classList.remove('playing');
    }
  }

  // Stepper dots — grouped by stage with a small gap
  let prev = null;
  document.getElementById('stepDots').innerHTML = STATES.map((s, i) => {
    const gap = prev && s.stage !== prev ? '<div style="width:8px"></div>' : '';
    prev = s.stage;
    return `${gap}<div class="step-dot${i === currentStep ? ' active' : ''}" onclick="goToState(${i})" title="${s.desc}"></div>`;
  }).join('');
}

// ── Audio player ──────────────────────────────────────────────
const audioEl = document.getElementById('audioEl');
let audioFakePlaying = false;
let audioQueue = [];

function playNextClip() {
  if (audioQueue.length === 0) return;
  const clip = audioQueue.shift();
  audioEl.src = clip;
  audioEl.load();
  audioEl.play().then(() => {
    const btn = document.getElementById('audioPlayBtn');
    btn.textContent = '⏸';
    btn.classList.add('playing');
  }).catch(e => console.warn('Autoplay blocked:', e));
}

audioEl.addEventListener('ended', () => {
  if (audioQueue.length > 0) {
    playNextClip();
  } else {
    const btn = document.getElementById('audioPlayBtn');
    btn.textContent = '▶';
    btn.classList.remove('playing');
  }
});

function toggleAudio() {
  const btn = document.getElementById('audioPlayBtn');
  const hasRealAudio = !!(STATES[currentStep] && STATES[currentStep].audio);
  if (hasRealAudio) {
    if (audioEl.paused) {
      audioEl.play().catch(e => console.warn('Audio play failed:', e));
      btn.textContent = '⏸';
      btn.classList.add('playing');
    } else {
      audioEl.pause();
      btn.textContent = '▶';
      btn.classList.remove('playing');
    }
  } else {
    // No file — visual toggle only
    if (audioFakePlaying) {
      audioFakePlaying = false;
      btn.textContent = '▶';
      btn.classList.remove('playing');
    } else {
      audioFakePlaying = true;
      btn.textContent = '⏸';
      btn.classList.add('playing');
    }
  }
}

// ── Fit devices to fill available screen space ──────────────────
function fitDevices() {
  const mobileVisible = !document.getElementById('mobileWrap').classList.contains('hidden');
  const topPad  = mobileVisible ? 68 : 24;
  const botPad  = 60, sidePad = mobileVisible ? 48 : 24, gap = 36, wrapPad = mobileVisible ? 40 : 20;
  const availH = window.innerHeight - topPad - botPad;
  const availW = window.innerWidth - sidePad;

  // During recording: taller (860px). Pre/post visit: wider (1440px), taller (900px).
  const iframeW = mobileVisible ? 1280 : 1440;
  const iframeH = mobileVisible ? 860  : 900;

  let s, sd, mW, mH, dW, dH;

  if (mobileVisible) {
    const ratio = 844 / iframeH;
    const sH = availH / 844;
    const sW = (availW - gap - wrapPad * 2) / (390 + iframeW * ratio);
    s  = Math.min(sH, sW, 1.0);
    sd = s * ratio;
    mW = Math.round(390 * s);  mH = Math.round(844 * s);
    dW = Math.round(iframeW * sd); dH = Math.round(iframeH * sd);

    const mShell = document.querySelector('.mobile-shell');
    mShell.style.width  = mW + 'px';
    mShell.style.height = mH + 'px';
    document.getElementById('mobileFrame').style.transform = `scale(${s})`;

    // Update day/night gradient split
    const mWrapW = mW + wrapPad;
    const total  = mWrapW + gap + dW + wrapPad;
    const splitFromCenter = Math.round(total / 2 - (mWrapW + gap / 2));
    document.documentElement.style.setProperty('--split-offset', splitFromCenter + 'px');
  } else {
    // Desktop only — fill full available space
    const sH = availH / iframeH;
    const sW = (availW - wrapPad) / iframeW;
    sd = Math.min(sH, sW, 1.0);
    dW = Math.round(iframeW * sd); dH = Math.round(iframeH * sd);
  }

  // Sync iframe native resolution to match current mode
  const df = document.getElementById('desktopFrame');
  df.style.width  = iframeW + 'px';
  df.style.height = iframeH + 'px';

  const dShell = document.querySelector('.desktop-shell');
  dShell.style.width  = dW + 'px';
  dShell.style.height = dH + 'px';
  df.style.transform = `scale(${sd})`;
}

fitDevices();
window.addEventListener('resize', fitDevices);

updateNav();

// Send initial state once iframes finish loading
window.addEventListener('load', () => {
  fitDevices();
  setTimeout(() => goToState(0), 500);
});

</script>
